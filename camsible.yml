- name: Basic setup for camsible
  hosts: localhost
  become: yes
  tasks:
    - name: Create the 'cam' user
      user:
        name: cam
        shell: /bin/zsh
        create_home: yes
        generate_ssh_key: true
        groups: sudo
        append: yes

    - name: Add 'cam' user to sudoers
      lineinfile:
        path: /etc/sudoers
        state: present
        line: 'cam ALL=(ALL) NOPASSWD:ALL'

    - name: Update the package list
      apt:
        update_cache: yes

    - name: Upgrade all packages to the latest version
      apt:
        upgrade: dist

    - name: Install essential packages
      apt:
        name: 
          - curl
          - zsh
          - git
          - vim
          - tmux
          - htop
          - tree
          - python3-pip
          - neovim
        state: present
    
    - name: Clone powerlevel10k
      become_user: cam
      git:
        repo: https://github.com/romkatv/powerlevel10k.git
        dest: /home/cam/powerlevel10k

    - name: Configure powerlevel10k in .zshrc
      become_user: cam
      lineinfile:
        path: /home/cam/.zshrc
        create: yes
        line: 'source ~/powerlevel10k/powerlevel10k.zsh-theme'

    - name: Source .zshrc to apply changes
      become_user: cam
      shell: source /home/cam/.zshrc