---
- name: Basic setup for camsible
  hosts: localhost
  become: yes
  tasks:
    - name: Create the 'cam' user
      user:
        name: cam
        shell: /bin/bash
        create_home: yes
        groups: sudo
        append: yes
        shell: /bin/zsh

    - name: Update the package list
      apt:
        update_cache: yes

    - name: Upgrade all packages to the latest version
      apt:
        upgrade: dist

    - name: Install essential packages
      apt:
        name: 
          - curl
          - zsh
          - git
          - vim
          - tmux
          - htop
          - tree
          - python3-pip
          - neovim
        state: present

    - switch to the 'cam' user
      become_user: cam
      become_method: su
      shell: /bin/zsh