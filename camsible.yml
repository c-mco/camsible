- name: Basic setup for camsible
  hosts: localhost
  become: yes
  tasks:
    - name: Create the 'cam' user
      user:
        name: cam
        shell: /bin/zsh
        create_home: yes
        groups: sudo
        append: yes

    - name: Add 'cam' user to sudoers
      lineinfile:
        path: /etc/sudoers
        state: present
        line: 'cam ALL=(ALL) NOPASSWD:ALL'

    - name: Update the package list
      apt:
        update_cache: yes

    - name: Upgrade all packages to the latest version
      apt:
        upgrade: dist

    - name: Install essential packages
      apt:
        name: 
          - curl
          - zsh
          - git
          - vim
          - tmux
          - htop
          - tree
          - python3-pip
          - neovim
          - stow
        state: present

    - name: Clone powerlevel10k
      become_user: cam
      git:
        repo: https://github.com/romkatv/powerlevel10k.git
        dest: /home/cam/powerlevel10k

    - name: Copy encrypted SSH keys tarball
      copy:
        src: ssh_keys.tar.gz
        dest: /home/cam/ssh_keys.tar.gz
        owner: cam
        group: cam
        mode: '0600'

    - name: Unpack SSH keys tarball
      become_user: cam
      ansible.builtin.command:
        cmd: tar xzf /home/cam/ssh_keys.tar.gz -C /home/cam/.ssh

    - name: Clone dotfiles repository
      become_user: cam
      git:
        repo: https://github.com/c-mco/dotfiles.git
        dest: /home/cam/.dotfiles

    - name: use stow to symlink dotfiles
      become: yes
      become_user: cam
      command: stow -t ~ git nvim p10k zsh
      args:
        chdir: ~/.dotfiles

    - name: Create directories for vim-plug
      become_user: cam
      file:
        path: "/home/cam/.local/share/nvim/site/autoload"
        state: directory
        mode: '0755'

    - name: install vim-plug
      become_user: cam
      get_url:
        url: https://raw.githubusercontent.com/junegunn/vim-plug/master/plug.vim
        dest: "/home/cam/.local/share/nvim/site/autoload/plug.vim"
        mode: '0644'