---
- name: Basic setup for camsible
  hosts: localhost
  become: yes
  tasks:
    - name: Update the package list
      apt:
        update_cache: yes

    - name: Upgrade all packages to the latest version
      apt:
        upgrade: dist

    - name: Install stuff!
      apt:
        name: curl, zsh, git, vim, tmux, htop, tree, python3-pip, neovim
        state: present

    - name: make zsh the default shell
      user:
        name: "{{ ansible_user }}"
        shell: /bin/zsh